blueprint:
  name: "Frank Energie - Smart Battery Manager v15.4 (Negative Export Guard)"
  description: >
    **Fix v15.4:**
    - **Negative Export Guard:** Twee nieuwe optionele velden toegevoegd. Koppel je 'kale prijs' sensor en de 'Zero Export' schakelaar van je omvormer. Duikt de kale prijs onder de €0.00? Dan trekt het systeem volautomatisch de export-handrem aan. Zodra de prijs weer positief is, mag de stroom het net weer op.
    - Bevat ook: EEPROM Guard, Tie-Breaker Patch, Hybrid Profiler, Night-Bypass Fix.
    
    STRATEGY: Predictive Profit, Solar Optimization & Hardware Protection.
  domain: automation
  input:
    # --- GENERAL ---
    language:
      name: "Language / Taal"
      default: "nl"
      selector:
        select:
          options:
            - label: "English"
              value: "en"
            - label: "Nederlands"
              value: "nl"

    # --- ENTITIES ---
    battery_reserve_switch:
      name: "Switch: Reserve Mode (Force Charge/Hold)"
      selector:
        entity:
          domain: switch
    feed_in_switch:
      name: "Switch: Feed-In Priority [OPTIONEEL]"
      default: []
      selector:
        entity:
          domain: switch
    battery_soc_sensor:
      name: "Sensor: Battery SoC"
      selector:
        entity:
          domain: sensor
          device_class: battery
    target_soc_number:
      name: "Entity: Target SoC"
      selector:
        entity:
          domain: number
    frank_price_sensor:
      name: "Sensor: Frank Energy Prices (All-in)"
      selector:
        entity:
          domain: sensor
    last_price_helper:
      name: "Helper: Last Purchase Price"
      selector:
        entity:
          domain: input_number
    sun_entity:
      name: "Sensor: Sun"
      default: "sun.sun"
      selector:
        entity:
          domain: sun

    # --- NEGATIVE PRICE GUARD (V15.4) ---
    raw_price_sensor:
      name: "Sensor: Frank Energy Raw Market Price (€) [OPTIONEEL]"
      description: "De kale marktprijs sensor (zonder belasting). Als deze onder de €0.00 duikt, activeert de Export-blokkade."
      default: []
      selector:
        entity:
          domain: sensor
    export_block_switch:
      name: "Switch: Zero Export / Export Limit [OPTIONEEL]"
      description: "Schakelaar die de teruglevering naar het net blokkeert (AAN = Blokkade Actief / 0 Watt export)."
      default: []
      selector:
        entity:
          domain: switch

    # --- FORECASTING & POWER ---
    solar_forecast_remaining_today:
      name: "Sensor: Solar Forecast Remaining Today (kWh) [OPTIONEEL]"
      default: []
      selector:
        entity:
          domain: sensor
    p1_power_sensor:
      name: "Sensor: P1 Grid Import (Watt)"
      default: []
      selector:
        entity:
          domain: sensor
          device_class: power
    battery_power_sensor:
      name: "Sensor: Battery Charging Power (Watt)"
      default: []
      selector:
        entity:
          domain: sensor
          device_class: power

    # --- HYBRID LOAD PROFILING ---
    sensor_load_night:
      name: "Sensor: Night Load (kW) [OPTIONEEL]"
      default: []
      selector:
        entity:
          domain: ["sensor", "input_number"]
    fallback_load_night:
      name: "Fallback: Night Load (00:00 - 06:00) in kW"
      default: 0.3
      selector:
        number:
          min: 0.0
          max: 10.0
          step: 0.1

    sensor_load_morning:
      name: "Sensor: Morning Load (kW) [OPTIONEEL]"
      default: []
      selector:
        entity:
          domain: ["sensor", "input_number"]
    fallback_load_morning:
      name: "Fallback: Morning Load (06:00 - 09:00) in kW"
      default: 1.5
      selector:
        number:
          min: 0.0
          max: 10.0
          step: 0.1

    sensor_load_day:
      name: "Sensor: Day Load (kW) [OPTIONEEL]"
      default: []
      selector:
        entity:
          domain: ["sensor", "input_number"]
    fallback_load_day:
      name: "Fallback: Day Load (09:00 - 17:00) in kW"
      default: 0.5
      selector:
        number:
          min: 0.0
          max: 10.0
          step: 0.1

    sensor_load_evening:
      name: "Sensor: Evening Load (kW) [OPTIONEEL]"
      default: []
      selector:
        entity:
          domain: ["sensor", "input_number"]
    fallback_load_evening:
      name: "Fallback: Evening Load (17:00 - 00:00) in kW"
      default: 2.0
      selector:
        number:
          min: 0.0
          max: 10.0
          step: 0.1

    # --- STRATEGY ---
    profit_lock_step:
      name: "Smart Hold: Profit Lock Step (%)"
      default: 5
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: "%"
    morning_survival_soc:
      name: "Morning Survival Target (%)"
      default: 35
      selector:
        number:
          min: 10
          max: 80
          unit_of_measurement: "%"
    peak_hours_count:
      name: "Peak Analysis Window"
      default: 3
      selector:
        number:
          min: 1
          max: 6
    buffer_discount_percentage:
      name: "Buffer Discount (%)"
      default: 40
      selector:
        number:
          min: 10
          max: 90
          unit_of_measurement: "%"
    min_discharge_margin:
      name: "Min. Discharge Profit (%)"
      default: 20
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    # --- GUARANTEES ---
    min_base_soc:
      name: "Absolute Minimum SoC (%)"
      default: 15
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    # --- NOTIFICATIONS ---
    boost_switch:
      name: "Switch: Manual Boost"
      default: []
      selector:
        entity:
          domain: input_boolean
    notify_device:
      name: "Notification Device"
      default: []
      selector:
        device:
          integration: mobile_app

    # --- TARGETS ---
    target_soc_winter:
      name: "Target SoC (Winter)"
      default: 90
      selector:
        number:
          min: 10
          max: 100
    target_soc_summer:
      name: "Target SoC (Summer)"
      default: 30
      selector:
        number:
          min: 10
          max: 100
    summer_solar_threshold:
      name: "Summer Solar Threshold (kWh)"
      default: 15
      selector:
        number:
          min: 0
          max: 100

    # --- SYSTEM ---
    solar_forecast_today:
      name: "Sensor: Solar Forecast Today"
      selector:
        entity:
          domain: sensor
    solar_forecast_tomorrow:
      name: "Sensor: Solar Forecast Tomorrow"
      selector:
        entity:
          domain: sensor
    battery_capacity_kwh:
      name: "Battery Capacity (kWh)"
      default: 10
      selector:
        number:
          min: 1
          max: 100
          step: 0.1
    charge_power_kw:
      name: "Charge Speed (kW)"
      default: 3.0
      selector:
        number:
          min: 0.1
          max: 22
          step: 0.1
    safety_factor:
      name: "BMS Safety Factor"
      default: 1.5
      selector:
        number:
          min: 1.0
          max: 4.0
          step: 0.1
    max_price_cap:
      name: "Absolute Max Price (€)"
      default: 0.35
      selector:
        number:
          min: 0
          max: 2.0
          step: 0.01

    # --- TIMING ---
    report_time_evening:
      name: "Report Time (Evening)"
      default: "21:30:00"
      selector:
        time:
    report_time_morning:
      name: "Report Time (Morning)"
      default: "08:00:00"
      selector:
        time:

# Trigger Variables
trigger_variables:
  boost_entity: !input boost_switch

trigger:
  - platform: time_pattern
    minutes: "/5"
    id: "timer"
  - platform: time
    at: !input report_time_evening
    id: "report"
  - platform: time
    at: !input report_time_morning
    id: "report"
  - platform: state
    entity_id: !input frank_price_sensor
    id: "price_change"
  - platform: state
    entity_id: !input raw_price_sensor
    id: "raw_price_change"
  - platform: state
    entity_id: !input battery_soc_sensor
    id: "soc_change"
  - platform: template
    value_template: "{{ boost_entity != [] and is_state(boost_entity, 'on') }}"
    id: "boost"

action:
  # --- HET EEPROM SCHILD (Anti-Flapping Guard) ---
  - condition: template
    value_template: >-
      {% if trigger is defined and trigger.platform == 'state' %}
        {{ trigger.to_state.state != trigger.from_state.state }}
      {% else %}
        true
      {% endif %}

  # --- STEP 1: VARIABLES & VALIDATION ---
  - variables:
      language: !input language
      conf_soc_sensor: !input battery_soc_sensor
      conf_price_sensor: !input frank_price_sensor
      conf_last_price: !input last_price_helper
      conf_boost: !input boost_switch
      conf_notify: !input notify_device
      conf_target_num: !input target_soc_number
      conf_switch: !input battery_reserve_switch
      conf_feed_in: !input feed_in_switch
      conf_sun: !input sun_entity
      conf_p1: !input p1_power_sensor
      conf_bat_pow: !input battery_power_sensor
      
      conf_raw_price: !input raw_price_sensor
      conf_export_block: !input export_block_switch
      
      conf_solar_rem: !input solar_forecast_remaining_today
      
      conf_load_night: !input sensor_load_night
      fallback_night: !input fallback_load_night
      conf_load_morning: !input sensor_load_morning
      fallback_morning: !input fallback_load_morning
      conf_load_day: !input sensor_load_day
      fallback_day: !input fallback_load_day
      conf_load_evening: !input sensor_load_evening
      fallback_evening: !input fallback_load_evening
      
      p_lock_step: !input profit_lock_step
      p_morning_soc: !input morning_survival_soc
      p_peak_count: !input peak_hours_count
      p_buffer_disc: !input buffer_discount_percentage
      p_min_discharge: !input min_discharge_margin
      p_bat_cap: !input battery_capacity_kwh
      p_charge_kw: !input charge_power_kw
      p_safety: !input safety_factor
      p_max_cap: !input max_price_cap
      p_min_base_soc: !input min_base_soc
      
      t_winter: !input target_soc_winter
      t_summer: !input target_soc_summer
      t_solar_th: !input summer_solar_threshold
      s_sol_today: !input solar_forecast_today
      s_sol_tom: !input solar_forecast_tomorrow

  # --- STEP 2: STATE READING & PROFILING ---
  - variables:
      current_soc: "{{ states(conf_soc_sensor) | float(0) }}"
      last_paid_price: "{{ states(conf_last_price) | float(0) }}"
      is_boost_active: "{{ conf_boost != [] and is_state(conf_boost, 'on') }}"
      has_notify_device: "{{ conf_notify != [] }}"
      now_ts: "{{ as_timestamp(now()) }}"
      is_daytime: "{{ is_state(conf_sun, 'above_horizon') }}"
      
      raw_price_state: "{{ states(conf_price_sensor) }}"
      current_price: >-
        {% if raw_price_state in ['unknown', 'unavailable', 'none'] %}
          {{ last_paid_price }}
        {% else %}
          {{ raw_price_state | float(last_paid_price) }}
        {% endif %}
        
      current_raw_price: >-
        {% if conf_raw_price != [] and states(conf_raw_price) not in ['unknown', 'unavailable', 'none'] %}
          {{ states(conf_raw_price) | float(0.0) }}
        {% else %}
          0.0
        {% endif %}
        
      val_night: >-
        {% if conf_load_night != [] and states(conf_load_night) not in ['unknown', 'unavailable', 'none'] %}
          {{ states(conf_load_night) | float(0) }}
        {% else %}
          {{ fallback_night }}
        {% endif %}
      val_morning: >-
        {% if conf_load_morning != [] and states(conf_load_morning) not in ['unknown', 'unavailable', 'none'] %}
          {{ states(conf_load_morning) | float(0) }}
        {% else %}
          {{ fallback_morning }}
        {% endif %}
      val_day: >-
        {% if conf_load_day != [] and states(conf_load_day) not in ['unknown', 'unavailable', 'none'] %}
          {{ states(conf_load_day) | float(0) }}
        {% else %}
          {{ fallback_day }}
        {% endif %}
      val_evening: >-
        {% if conf_load_evening != [] and states(conf_load_evening) not in ['unknown', 'unavailable', 'none'] %}
          {{ states(conf_load_evening) | float(0) }}
        {% else %}
          {{ fallback_evening }}
        {% endif %}
        
      current_load_kw: >-
        {% set h = now().hour %}
        {% if h < 6 %} {{ val_night }}
        {% elif h < 9 %} {{ val_morning }}
        {% elif h < 17 %} {{ val_day }}
        {% else %} {{ val_evening }}
        {% endif %}

  # --- STEP 3: HYBRID COST ---
  - variables:
      current_charging_cost: >-
        {% set is_active = is_state(conf_switch, 'on') %}
        {% if conf_p1 != [] and conf_bat_pow != [] %}
           {% set grid_w = states(conf_p1) | float(0) %}
           {% set bat_w = states(conf_bat_pow) | float(0) %}
           {% if bat_w > 10 %}
             {% set grid_import = [grid_w, 0] | max %}
             {% set ratio = [ (grid_import / bat_w), 1.0 ] | min %}
             {{ current_price * ratio }}
           {% else %}
             {{ current_price if is_active else 0.0 }}
           {% endif %}
        {% else %}
           {{ current_price if is_active else 0.0 }}
        {% endif %}

  # --- STEP 4: UNIVERSAL PRICE ENGINE ---
  - choose:
      - conditions:
          - condition: trigger
            id: "soc_change"
          - condition: template
            value_template: "{{ trigger.to_state.state | float(0) > trigger.from_state.state | float(0) }}"
        sequence:
          - service: input_number.set_value
            target: {entity_id: !input last_price_helper}
            data:
              value: >-
                {% set old_soc = trigger.from_state.state | float(0) %}
                {% set new_soc = trigger.to_state.state | float(0) %}
                {% set diff = new_soc - old_soc %}
                {% set old_price = last_paid_price %}
                {% set cost = current_charging_cost | float(current_price) %}
                
                {% if not is_daytime and cost == 0 %}
                   {{ old_price }}
                {% else %}
                   {% if new_soc > 0 %}
                     {{ (((old_soc * old_price) + (diff * cost)) / new_soc) | round(4) }}
                   {% else %}
                     {{ old_price }}
                   {% endif %}
                {% endif %}
          - stop: "Prijs succesvol geüpdatet via SOC stijging."

  # --- STEP 5: DATA PARSING ---
  - variables:
      raw: "{{ state_attr(conf_price_sensor, 'prices') }}"
      prices_json: >-
        {% if raw %}
          {% set text = raw | string %}
          {% set matches = text | regex_findall(
            "datetime\\.datetime\\((\\d+), (\\d+), (\\d+), (\\d+), (\\d+).*?price': ([0-9.-]+)"
          ) %}
          [
          {%- for m in matches %}
            {% set y = m[0]|int %}
            {% set mo = m[1]|int %}
            {% set d = m[2]|int %}
            {% set h = m[3]|int %}
            {% set mn = m[4]|int %}
            {% set price = m[5]|float %}
            {% set raw_dt_str = "%04d-%02d-%02dT%02d:%02d:00" | format(y, mo, d, h, mn) %}
            {% set ts_val = as_timestamp(raw_dt_str) %}
            {
              "local_hour": {{ h }},
              "day_str": "{{ 'Vandaag' if d == now().day else 'Morgen' }}",
              "ts": {{ ts_val }},
              "price": {{ price }}
            }{{ "," if not loop.last }}
          {%- endfor %}
          ]
        {% else %} [] {% endif %}

  # --- STEP 6: FILTER & ANALYZE ---
  - variables:
      filtered_data: >-
        {% set output = namespace(all_prices=[], future_slots=[], charge_prices=[], discharge_prices=[]) %}
        {% set history_cutoff = now_ts - 3600 %}
        {% set charge_lookahead = now_ts + (12 * 3600) %}
        {% set discharge_lookahead = now_ts + (8 * 3600) %} 
        
        {% if prices_json %}
           {% for item in prices_json %}
              {% if item.ts >= history_cutoff %}
                  {% set output.all_prices = output.all_prices + [item.price] %}
                  {% set output.future_slots = output.future_slots + [item] %}
                  {% if item.ts <= charge_lookahead %}
                     {% set output.charge_prices = output.charge_prices + [item.price] %}
                  {% endif %}
                  {% if item.ts <= discharge_lookahead %}
                     {% set output.discharge_prices = output.discharge_prices + [item.price] %}
                  {% endif %}
              {% endif %}
           {% endfor %}
        {% endif %}
        {% set pk_count = p_peak_count | int %}
        {% set sorted_charge = output.charge_prices | sort(reverse=True) %}
        {% set rolling_peak = 0 %}
        {% if sorted_charge | length > 0 %}
           {% set count = [sorted_charge|length, pk_count] | min %}
           {% set rolling_peak = (sorted_charge[:count] | sum / count) %}
        {% endif %}
        {"all": {{ output.all_prices }}, "slots": {{ output.future_slots }}, "peak": {{ rolling_peak }}, "discharge_term": {{ output.discharge_prices }} }

  # --- STEP 7: DERIVED VARIABLES & HYSTERESIS ---
  - variables:
      sorted_all: "{{ filtered_data.all | sort }}"
      relevant_peak_price: "{{ filtered_data.peak }}"
      buffer_limit: "{{ relevant_peak_price | float * (1 - (p_buffer_disc | float / 100)) }}"

      forecast_tomorrow_val: "{{ states(s_sol_tom) | float(0) }}"
      relevant_solar: >-
        {% if now().hour >= 14 %} {{ forecast_tomorrow_val }}
        {% else %} {{ states(s_sol_today) | float(0) }}
        {% endif %}
      dynamic_target_soc: >-
        {% if relevant_solar | float > t_solar_th | float %} {{ t_summer }}
        {% else %} {{ t_winter }}
        {% endif %}
        
      expected_house_load_today: >-
        {% set h = now().hour %}
        {% set ns = namespace(rem_kwh=0.0) %}
        {% for i in range(h, 24) %}
           {% if i < 6 %} {% set ns.rem_kwh = ns.rem_kwh + (val_night | float) %}
           {% elif i < 9 %} {% set ns.rem_kwh = ns.rem_kwh + (val_morning | float) %}
           {% elif i < 17 %} {% set ns.rem_kwh = ns.rem_kwh + (val_day | float) %}
           {% else %} {% set ns.rem_kwh = ns.rem_kwh + (val_evening | float) %}
           {% endif %}
        {% endfor %}
        {{ ns.rem_kwh }}

      effective_solar_rem: >-
        {% if conf_solar_rem != [] and states(conf_solar_rem) not in ['unknown', 'unavailable', 'none'] %}
           {% set raw_solar = states(conf_solar_rem) | float(0) %}
           {{ [raw_solar - (expected_house_load_today | float), 0.0] | max }}
        {% else %}
           0.0
        {% endif %}

      solar_charging_override: >-
        {% set virtual_soc_solar = current_soc %}
        {% if is_state(conf_switch, 'off') %}
           {% set virtual_soc_solar = current_soc + 3.0 %}
        {% endif %}
        {% set deficit = dynamic_target_soc | float - virtual_soc_solar %}
        {% if deficit > 0 %}
           {% set kwh_needed = (deficit / 100.0) * p_bat_cap | float %}
           {{ (effective_solar_rem | float) >= kwh_needed and current_price >= 0.0 }}
        {% else %}
           True
        {% endif %}

      morning_survival_limit: >-
        {% set current_h = now().hour %}
        {% if current_h < 6 or current_h >= 21 %}
           {% set survival_target = p_morning_soc | float %}
           {% set is_active_morning = is_state(conf_switch, 'on') and (states(conf_target_num)|float(0) == survival_target) %}
           {% set threshold = survival_target if is_active_morning else (survival_target - 2) %}
           
           {% if current_soc < threshold %}
              {% set deficit = survival_target - current_soc %}
              {% set kwh_needed = (deficit / 100.0) * p_bat_cap | float %}
              {% set hours_needed = (kwh_needed / p_charge_kw | float * p_safety | float) | round(0, 'ceil') | int %}
              {% set hours_needed = [hours_needed, 1] | max %}

              {% set today_date = now().strftime('%Y-%m-%d') %}
              {% set today_6am = as_timestamp(today_date ~ ' 06:00:00') %}
              {% set target_6am = (today_6am + 86400) if current_h >= 6 else today_6am %}

              {% set ns = namespace(prices=[]) %}
              {% for item in filtered_data.slots %}
                 {% if item.ts < target_6am %}
                    {% set ns.prices = ns.prices + [item.price] %}
                 {% endif %}
              {% endfor %}

              {% set sorted_night = ns.prices | sort %}
              {% if sorted_night | length > 0 %}
                 {% set idx = (hours_needed - 1) if (hours_needed - 1) < sorted_night|length else (sorted_night|length - 1) %}
                 {{ sorted_night[idx] }}
              {% else %} -999 {% endif %}
           {% else %} -999 {% endif %}
        {% else %} -999 {% endif %}

      charge_limit_strict: >-
        {% set deficit = dynamic_target_soc | float - current_soc %}
        {% if deficit > 0 %}
           {% set kwh_needed = (deficit / 100.0) * p_bat_cap | float %}
           {% set net_kwh_needed = kwh_needed - (effective_solar_rem | float) %}
           {% if net_kwh_needed > 0 %}
             {% set hours_needed = (net_kwh_needed / p_charge_kw | float * p_safety | float) | round(0, 'ceil') | int %}
             {% set hours_needed = [hours_needed, 1] | max %}
             {% if sorted_all | length > 0 %}
               {% set idx = (hours_needed - 1) if (hours_needed - 1) < sorted_all|length else (sorted_all|length - 1) %}
               {{ sorted_all[idx] }}
             {% else %} -999 {% endif %}
           {% else %} -999 {% endif %}
        {% else %} -999 {% endif %}
        
      active_target_soc: >-
        {% set is_morning_charge = (morning_survival_limit | float != -999.0) and (current_price | round(3) <= morning_survival_limit | round(3)) and (current_soc < (p_morning_soc | float - 0.1)) %}
        {% set normal_strict = (charge_limit_strict | float != -999.0) and (current_price | round(3) <= charge_limit_strict | round(3)) and not solar_charging_override %}
        {% set normal_buffer = (current_price | round(3) <= buffer_limit | round(3)) and not solar_charging_override %}
        
        {% if normal_strict or normal_buffer %}
           {{ dynamic_target_soc }}
        {% elif is_morning_charge %}
           {{ p_morning_soc }}
        {% else %}
           {{ dynamic_target_soc }}
        {% endif %}

      discharge_start_price: >-
        {% set base_margin_price = last_paid_price * (1 + (p_min_discharge|float / 100)) %}
        {% set virtual_soc = current_soc %}
        
        {% if is_state(conf_switch, 'off') and current_soc > (p_min_base_soc | float + 1) %}
           {% set virtual_soc = current_soc + 2.0 %}
        {% endif %}
        
        {% set usable_soc = virtual_soc - (p_min_base_soc | float) %}
        
        {% if usable_soc > 0 %}
           {% set ns = namespace(hours_to_charge=8) %}
           {% set limit_strict = charge_limit_strict | float %}
           {% set limit_buffer = buffer_limit | float %}
           
           {% for item in filtered_data.slots[:8] %}
              {% if item.price <= limit_strict or item.price <= limit_buffer %}
                 {% if loop.index0 < ns.hours_to_charge %}
                    {% set ns.hours_to_charge = loop.index0 %}
                 {% endif %}
              {% endif %}
           {% endfor %}
           
           {% set horizon = ns.hours_to_charge %}
           {% set horizon = [horizon, 1] | max %}
           
           {% set kwh_avail = (usable_soc / 100.0) * (p_bat_cap | float) %}
           
           {% set h = now().hour %}
           {% set ns2 = namespace(rem=kwh_avail, hours=0) %}
           {% for i in range(h, h + 24) %}
              {% if ns2.rem > 0 %}
                 {% set hd = i % 24 %}
                 {% set load = (val_night | float) if hd < 6 else ((val_morning | float) if hd < 9 else ((val_day | float) if hd < 17 else (val_evening | float))) %}
                 {% set ns2.rem = ns2.rem - load %}
                 {% set ns2.hours = ns2.hours + 1 %}
              {% endif %}
           {% endfor %}
           {% set hours_to_empty = [ns2.hours, 1] | max %}
           
           {% set active_slots = filtered_data.slots[:horizon] | map(attribute='price') | list %}
           {% set reverse_sorted = active_slots | sort(reverse=True) %}
           {% set lookahead_len = reverse_sorted | length %}
           
           {% if lookahead_len > 0 %}
             {% set allowed_hours = [hours_to_empty, lookahead_len] | min %}
             {% set optimal_price = reverse_sorted[allowed_hours - 1] %}
             {% set raw_discharge = [base_margin_price, optimal_price] | max %}
           {% else %}
             {% set raw_discharge = base_margin_price %}
           {% endif %}
        {% else %}
           {% set raw_discharge = base_margin_price %}
        {% endif %}
        
        {% set active_charge_limit = [charge_limit_strict | float, morning_survival_limit | float] | max %}
        {% if active_charge_limit != -999.0 %}
           {{ [raw_discharge, (active_charge_limit + 0.01)] | max | round(4) }}
        {% else %}
           {{ raw_discharge | round(4) }}
        {% endif %}

      feed_in_start_price: >-
        {% set peak_bypass = relevant_peak_price | float * 0.85 %}
        {% set discharge_bypass = discharge_start_price | float * 0.85 %}
        {{ [peak_bypass, discharge_bypass] | max | round(3) }}

  # --- STEP 8: EXECUTION (STATE ENGINE) ---
  - choose:
      # --- PRIORITY 1: REPORTING ---
      - alias: "1. Send Report"
        conditions:
          - condition: trigger
            id: "report"
        sequence:
          - if:
              - condition: template
                value_template: "{{ has_notify_device }}"
            then:
              - domain: mobile_app
                type: notify
                device_id: !input notify_device
                message: >-
                  {% if language == 'nl' %}
                    📊 **Dayround Status**
                    🔋 SoC: {{ current_soc }}% | Inkoop: €{{ last_paid_price | round(3) }}
                    💰 Huidig: €{{ current_price | round(3) }}
                    
                    📉 **Drempels**
                    Strikt: €{{ charge_limit_strict | round(3) }}
                    Morning: €{{ morning_survival_limit | round(3) }}
                    Feed-In Bypass: €{{ feed_in_start_price | round(3) }}
                    Verkoopgrens: €{{ discharge_start_price | round(3) }}
                    (Profiel: {{ current_load_kw }} kW afname nu)
                  {% else %}
                    Status: {{ current_soc }}%
                  {% endif %}

      # --- PRIORITY 2: BOOST ---
      - alias: "2. Boost Mode"
        conditions:
          - condition: template
            value_template: "{{ is_boost_active }}"
        sequence:
          - service: number.set_value
            target: {entity_id: !input target_soc_number}
            data: {value: 100}
          - service: switch.turn_on
            target: {entity_id: !input battery_reserve_switch}
          - if:
              - condition: template
                value_template: "{{ conf_feed_in != [] }}"
            then:
              - service: switch.turn_off
                target: {entity_id: !input feed_in_switch}

      # --- PRIORITY 3: EMERGENCY ---
      - alias: "3. Emergency Charge"
        conditions:
          - condition: template
            value_template: >-
              {% set target = states(conf_target_num)|float(0) %}
              {% set is_active_emerg = is_state(conf_switch, 'on') and (target == (p_min_base_soc | float + 2)) %}
              {% set threshold = (p_min_base_soc | float + 2) if is_active_emerg else (p_min_base_soc | float) %}
              {{ current_soc < threshold }}
          - condition: template
            value_template: "{{ current_price < (p_max_cap | float * 1.5) }}"
        sequence:
          - variables:
              was_off: "{{ is_state(conf_switch, 'off') }}"
          
          - if:
              - condition: template
                value_template: "{{ (states(conf_target_num)|float(0) - (p_min_base_soc|float + 2))|abs > 0.1 }}"
            then:
              - service: number.set_value
                target: {entity_id: !input target_soc_number}
                data: {value: "{{ p_min_base_soc | float + 2 }}"}
          
          - if:
              - condition: template
                value_template: "{{ conf_feed_in != [] }}"
            then:
              - service: switch.turn_off
                target: {entity_id: !input feed_in_switch}
                
          - if:
              - condition: template
                value_template: "{{ was_off }}"
            then:
              - service: switch.turn_on
                target: {entity_id: !input battery_reserve_switch}
              - if:
                  - condition: template
                    value_template: "{{ has_notify_device }}"
                then:
                  - domain: mobile_app
                    type: notify
                    device_id: !input notify_device
                    message: "🔴 Noodladen gestart (€{{ current_price | round(3) }})"

      # --- PRIORITY 4: SMART CHARGING ---
      - alias: "4. Smart Charging"
        conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: template
                    value_template: "{{ morning_survival_limit | float != -999.0 }}"
                  - condition: template
                    value_template: "{{ current_price | round(3) <= morning_survival_limit | round(3) }}"
                  - condition: template
                    value_template: "{{ current_soc < (p_morning_soc | float - 0.1) }}"
                  - condition: template
                    value_template: "{{ current_price < p_max_cap | float }}"
                  - condition: template
                    value_template: "{{ current_price | round(3) < discharge_start_price | round(3) }}"
              - condition: and
                conditions:
                  - condition: template
                    value_template: "{{ charge_limit_strict | float != -999.0 }}"
                  - condition: template
                    value_template: "{{ current_price | round(3) <= charge_limit_strict | round(3) }}"
                  - condition: template
                    value_template: "{{ current_soc < (dynamic_target_soc | float - 1) }}"
                  - condition: template
                    value_template: "{{ current_price < p_max_cap | float }}"
                  - condition: template
                    value_template: "{{ not solar_charging_override }}"
                  - condition: template
                    value_template: "{{ current_price | round(3) < discharge_start_price | round(3) }}"
              - condition: and
                conditions:
                  - condition: template
                    value_template: "{{ current_price | round(3) <= buffer_limit | round(3) }}"
                  - condition: template
                    value_template: "{{ current_soc < (dynamic_target_soc | float - 1) }}"
                  - condition: template
                    value_template: "{{ current_price < p_max_cap | float }}"
                  - condition: template
                    value_template: "{{ not solar_charging_override }}"
                  - condition: template
                    value_template: "{{ current_price | round(3) < discharge_start_price | round(3) }}"
        sequence:
          - variables:
              was_off: "{{ is_state(conf_switch, 'off') }}"
              
          - if:
              - condition: template
                value_template: "{{ (states(conf_target_num)|float(0) - active_target_soc|float)|abs > 0.1 }}"
            then:
              - service: number.set_value
                target: {entity_id: !input target_soc_number}
                data: {value: "{{ active_target_soc }}"}
                
          - if:
              - condition: template
                value_template: "{{ conf_feed_in != [] }}"
            then:
              - service: switch.turn_off
                target: {entity_id: !input feed_in_switch}
                
          - if:
              - condition: template
                value_template: "{{ was_off }}"
            then:
              - service: switch.turn_on
                target: {entity_id: !input battery_reserve_switch}
              - if:
                  - condition: template
                    value_template: "{{ has_notify_device }}"
                then:
                  - domain: mobile_app
                    type: notify
                    device_id: !input notify_device
                    message: "🟢 Start Laden (€{{ current_price | round(3) }})"

      # --- PRIORITY 5: DISCHARGING ---
      - alias: "5. Discharging"
        conditions:
          - condition: template
            value_template: "{{ current_soc > (p_min_base_soc | float + 1) }}"
          - condition: template
            value_template: >-
              {% if is_state(conf_switch, 'off') %}
                 {{ current_price | round(3) >= (discharge_start_price | float - 0.02) | round(3) }}
              {% else %}
                 {{ current_price | round(3) >= discharge_start_price | round(3) }}
              {% endif %}
          - condition: template
            value_template: "{{ current_price | round(3) > buffer_limit | round(3) }}"
        sequence:
          - variables:
              was_on: "{{ is_state(conf_switch, 'on') }}"
              
          - if:
              - condition: template
                value_template: "{{ conf_feed_in != [] }}"
            then:
              - service: switch.turn_on
                target: {entity_id: !input feed_in_switch}
                
          - if:
              - condition: template
                value_template: "{{ was_on }}"
            then:
              - service: switch.turn_off
                target: {entity_id: !input battery_reserve_switch}
              - if:
                  - condition: template
                    value_template: "{{ has_notify_device }}"
                then:
                  - domain: mobile_app
                    type: notify
                    device_id: !input notify_device
                    message: "🔵 Start Ontladen (€{{ current_price | round(3) }})"

      # --- PRIORITY 5.5: SOLAR BYPASS (NIGHT-FIX) ---
      - alias: "5.5. Solar Bypass (Feed-In Priority)"
        conditions:
          - condition: template
            value_template: "{{ is_daytime }}"
          - condition: template
            value_template: "{{ current_price | round(3) >= feed_in_start_price | round(3) }}"
          - condition: template
            value_template: "{{ current_price | round(3) < discharge_start_price | round(3) }}"
          - condition: template
            value_template: "{{ conf_feed_in != [] }}"
        sequence:
          - variables:
              feed_in_was_off: "{{ is_state(conf_feed_in, 'off') }}"
              was_off: "{{ is_state(conf_switch, 'off') }}"
          
          - if:
              - condition: template
                value_template: "{{ was_off }}"
            then:
              - service: switch.turn_on
                target: {entity_id: !input battery_reserve_switch}
                
          - if:
              - condition: template
                value_template: >-
                  {% set target = states(conf_target_num)|float(0) %}
                  {{ (target - current_soc) > 2 or (current_soc - target) >= p_lock_step }}
            then:
              - service: number.set_value
                target: {entity_id: !input target_soc_number}
                data: {value: "{{ current_soc | int }}"}
            
          - if:
              - condition: template
                value_template: "{{ feed_in_was_off }}"
            then:
              - service: switch.turn_on
                target: {entity_id: !input feed_in_switch}
              - if:
                  - condition: template
                    value_template: "{{ has_notify_device }}"
                then:
                  - domain: mobile_app
                    type: notify
                    device_id: !input notify_device
                    message: "☀️ Solar Bypass Actief. Batterij op slot, zonnestroom naar net!"

      # --- PRIORITY 6: SMART HOLD ---
      - alias: "6. Smart Hold"
        conditions:
          - condition: template
            value_template: "{{ current_price | round(3) > charge_limit_strict | round(3) }}"
          - condition: template
            value_template: "{{ current_price | round(3) > morning_survival_limit | round(3) }}"
          - condition: template
            value_template: >-
              {% if is_state(conf_switch, 'off') %}
                 {{ current_price | round(3) < (discharge_start_price | float - 0.02) | round(3) }}
              {% else %}
                 {{ current_price | round(3) < discharge_start_price | round(3) }}
              {% endif %}
          - condition: template
            value_template: >-
              {% if conf_feed_in != [] and is_daytime %}
                 {{ current_price | round(3) < feed_in_start_price | round(3) }}
              {% else %}
                 true
              {% endif %}
          - condition: template
            value_template: "{{ current_soc > p_min_base_soc | float }}"
        sequence:
          - variables:
              was_off: "{{ is_state(conf_switch, 'off') }}"
              
          - if:
              - condition: template
                value_template: "{{ conf_feed_in != [] }}"
            then:
              - service: switch.turn_off
                target: {entity_id: !input feed_in_switch}
              
          - if:
              - condition: template
                value_template: "{{ was_off }}"
            then:
              - service: switch.turn_on
                target: {entity_id: !input battery_reserve_switch}
              - if:
                  - condition: template
                    value_template: "{{ has_notify_device }}"
                then:
                  - domain: mobile_app
                    type: notify
                    device_id: !input notify_device
                    message: "🟡 Smart Hold (Wachten op Top-Prijs)"
                    
          - if:
              - condition: template
                value_template: >-
                  {% set target = states(conf_target_num)|float(0) %}
                  {{ (target - current_soc) > 2 or (current_soc - target) >= p_lock_step }}
            then:
              - service: number.set_value
                target: {entity_id: !input target_soc_number}
                data: {value: "{{ current_soc | int }}"}

    # --- PRIORITY 7: DEFAULT ---
    default:
      - service: switch.turn_off
        target: {entity_id: !input battery_reserve_switch}
      - if:
          - condition: template
            value_template: "{{ conf_feed_in != [] }}"
        then:
          - service: switch.turn_off
            target: {entity_id: !input feed_in_switch}

  # --- STEP 9: NEGATIVE EXPORT GUARD (V15.4) ---
  - if:
      - condition: template
        value_template: "{{ conf_export_block != [] and conf_raw_price != [] }}"
    then:
      - if:
          - condition: template
            value_template: "{{ current_raw_price < 0.0 }}"
        then:
          - if:
              - condition: template
                value_template: "{{ is_state(conf_export_block, 'off') }}"
            then:
              - service: switch.turn_on
                target: {entity_id: !input export_block_switch}
              - if:
                  - condition: template
                    value_template: "{{ has_notify_device }}"
                then:
                  - domain: mobile_app
                    type: notify
                    device_id: !input notify_device
                    message: "⛔ Negatieve kale stroomprijs (€{{ current_raw_price }}). Zonnepanelen export tijdelijk geblokkeerd!"
        else:
          - if:
              - condition: template
                value_template: "{{ is_state(conf_export_block, 'on') }}"
            then:
              - service: switch.turn_off
                target: {entity_id: !input export_block_switch}
              - if:
                  - condition: template
                    value_template: "{{ has_notify_device }}"
                  then:
                    - domain: mobile_app
                      type: notify
                      device_id: !input notify_device
                      message: "✅ Kale stroomprijs is weer positief (€{{ current_raw_price }}). Export blokkade opgeheven."

mode: single
